<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresos - Tech Solutions S.A.S</title>
    <link rel="stylesheet" href="../styles/theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 3rem;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            text-align: center;
        }
        h1 { color: var(--text); margin-bottom: 0.5rem; }
        p { color: var(--text-muted); margin-bottom: 2rem; }
        a {
            display: inline-block;
            background: var(--accent);
            color: #000;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            transition: opacity 0.3s;
        }
        a:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ingresos</h1>
        <p>Panel de ingresos</p>
        <a href="../../dashboard.html">Volver al Dashboard</a>
    </div>
</body>
</html>
